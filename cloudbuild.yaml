steps:
  # Build Docker image
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - build
      - '-t'
      - 'us-central1-docker.pkg.dev/$PROJECT_ID/pr-scrutiny/app:$COMMIT_SHA'
      - '-t'
      - 'us-central1-docker.pkg.dev/$PROJECT_ID/pr-scrutiny/app:latest'
      - '.'

  # Push to Artifact Registry
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - push
      - '--all-tags'
      - 'us-central1-docker.pkg.dev/$PROJECT_ID/pr-scrutiny/app'

  # Deploy to Cloud Run
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: gcloud
    args:
      - run
      - deploy
      - pr-scrutiny
      - '--image=us-central1-docker.pkg.dev/$PROJECT_ID/pr-scrutiny/app:$COMMIT_SHA'
      - '--region=us-central1'
      - '--platform=managed'
      - '--allow-unauthenticated'
      - '--concurrency=1'
      - '--min-instances=0'
      - '--max-instances=10'
      - '--memory=512Mi'
      - '--cpu=1'
      - '--timeout=120s'
      - '--set-env-vars=GCP_PROJECT_ID=$PROJECT_ID,KMS_KEYRING=pr-scrutiny,KMS_KEY=installation-keys'
      - >-
        --set-secrets=GITHUB_WEBHOOK_SECRET=GITHUB_WEBHOOK_SECRET:latest,GITHUB_APP_ID=GITHUB_APP_ID:latest,GITHUB_APP_PRIVATE_KEY=GITHUB_APP_PRIVATE_KEY:latest

images:
  - 'us-central1-docker.pkg.dev/$PROJECT_ID/pr-scrutiny/app:$COMMIT_SHA'
  - 'us-central1-docker.pkg.dev/$PROJECT_ID/pr-scrutiny/app:latest'

options:
  logging: CLOUD_LOGGING_ONLY
